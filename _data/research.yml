- title: Enteric nervous system and neuro-immune interaction
  summary: "Our group focuses on the gut-brain axis and neuroimmunology, with core research targeting the regionalized coding of the enteric nervous system (ENS), neuro-innate immune crosstalk, and multiscale regulatory mechanisms of inflammation. We have developed innovative technical platforms tailored for enteric neuroscience, including RAISIN-V2-Seq and an in vivo ENS single-cell CRISPR screening system (ENS Perturb-seq), combined with STARmap PLUS spatial transcriptomics to map the gut-brain axis and dissect in situ cell-cell communication networks in homeostasis and inflammation. Using these tools, we constructed the world’s first multidimensional single-cell atlas of enteric neurons spanning multiple intestinal segments, covering varied microbiota status and inflammatory conditions, and identified key regulators governing enteric neuron cell states and their crosstalk with the microbiota and type 2 immune cells (Science, 2025; featured in FASI media report titled “Gut Neurons Decoded”). Based on our proprietary techniques and high-resolution atlases, we have revised the fundamental understanding of ENS regionalized regulation and neuro-immune interactions, providing a theoretical basis for the site-specific pathogenesis of intestinal inflammation. Moreover, we identified progenitor-like enteric neurons in adult mouse and clarified their microbiota- and inflammation-driven differentiation or shift in cell-state mechanisms, with Edf1 and Mitf as key regulatory molecules that link cell-state to gut physiology."

- title: Innate sensing against gut pathogens
  summary: "Innate immunity is the primary line of defense against pathogens, initiated through pattern recognition receptors (PPR), such as intracellular cGAS, RIG-I, NOD, and inflammasomes. The immune response is tightly regulated in time and space, and its dysregulation can lead to cytokine storm syndrome, autoimmunity, and cancer. Organelles with membrane structures provide platforms for antiviral innate immunity. Therefore, the spatiotemporal proteomic profiling of core molecules on membrane platforms that regulate antiviral response and immune escape is crucial for the development of antiviral drugs. We successfully developed a live-cell and organelle-specific proximity biotin-labeling technology (Nature Cell Biology, 2015) based on Rhee et al. Science 2015 and use mass spectrometry to discover two protein complexes on different organelles with TRIM14 as the core protein. These complexes allow us to study viral-specific immune activation (time) and protein-protein interaction (PPI) network across organelles (space) in type I IFN signaling: (1) anti-DNA virus: TRIM14-USP14 complex associates with autophagosomes and stabilizes cGAS (Molecular Cell, 2016) (2) anti-RNA virus: The mitochondrial WHIP-TRIM14-PPP6C complex regulates the mitochondrial spatiotemporal trafficking and activation of RIG-I (Molecular Cell, 2017). In the context of the COVID-19 pandemic, we utilized scRNA-seq to investigate the viral invasion pathways and mechanisms at the single-cell level, aiming to better understand the immunology of SARS-CoV-2 and acute respiratory distress syndrome (ARDS). Our analysis of the viral invasion receptors—ACE2, TMPRSS2, and CTSL—across various tissues and demographic groups revealed that receptor expression was positively correlated with age and smoking history. Additionally, we identified immune response regulatory networks and potential drug targets that may aid in the development of COVID-19 treatments (Nature Medicine, 2021)."

- title: Gastrointestinal tumor environment
  summary: "The tumor microenvironment (TME) consists of cancer cells and non-cancer components, such as myeloid immune cells, neurons, stromal cells, adipocytes, and microbes. There are still questions to be addressed about TME: (1) How is the TME formed in space and time? (2) How are cells in TME remodeled and recruited? (3) How is the expression of immune checkpoint molecules regulated in cancer to evade T cell killing? (4) What is the role of the microbiome in tumor development? We have demonstrated that Beclin-1 is a neutrophil-specific immune checkpoint for pre B-ALL (Journal of Clinical Investigation, 2019). This finding is consistent with the observations that the \"high tumor infiltration of neutrophils is positively associated with poor prognosis in cancer patients\" (Gentles et al. Nature Medicine, 2015) and the expression levels of Beclin-1 in most cancer patients are low (Wechman et al. Advanced Cancer Research, 2018). By far, the clinical effect of CAR-T cell therapy on B-ALL is often limited by the gradual loss of CD19 or CD20 expression in some cancer cell clones. Our research suggests that neutrophils and the Beclin-1-IL-21 axis are new drug targets for the treatment of B-ALL to complement CAR-T limitations of cell therapy. In addition, the gut microbiota plays a key role in the development of colitis and colon cancer, but the exact mechanisms remain unclear. We established a myeloid cell-specific Tak1-deficient mouse model and found that it was completely resistant to chemically induced acute colitis and colon cancer. Using metagenomic sequencing and fecal transfer methods, we identified a single strain of Odoribacter splanchnicus enriched in Tak1 knockout mice. The strain promotes the accumulation of protective immune cells Th17 by triggering the innate immune factors IL-1β and IL-6, thereby inhibiting the occurrence and development of colitis and colon cancer (Cell Host & Microbe, 2021)."

- title: Optogenetics in gut biology and diseases
  summary: "We have developed genetically encoded optogenetic tools combined with UNCP nanoparticles, which are designed to enable long-range and deep-tissue light delivery for targeted regulation —— OptoCRAC, LiCa, OptoPB，Sunbody and Moonbody，PhotoSMOC, OptoCAR, pNUTs—— to begin to decode the core logic of calcium-dependent immune activation, membrane-contact site dynamics，type I IFN signaling, intrabody mechanism，liquid-liquid phase separation and nucleolar compartmentation, CAR-T activation (eLife, 2015; Trends in Biotechnology, 2017; Chemical Science, 2017; Advanced Biology, 2021; Nature Communications, 2021; Nature Chemical Biology, 2021; Nucleic Acids Research, 2022), which are fundamentals to our understanding of neural and immune systems. Our contributions to the field of optogenetics led to an invitation to author a special review on optogenetics and cell physiology (Physiological Reviews, 2022)."
