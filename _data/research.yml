- title: "The discovery of enteric developmental 'engram' cells and neuro-immune interactions"
  summary: |
    We constructed platforms tailored for enteric neuroimmunology to systematically dissect enteric neuroimmune interactions and gut–brain connections under inflammatory and autoimmune conditions (RAISIN-V2-Seq，ENS In vivo Perturb-sesq，STARmap PLUS spatial transcriptomics;<span style="color:blue">Science, 2025</span>; <span style="color:blue">Nature, 2023</span>). Using this system, we generated the first multidimensional single-cell atlas of enteric neurons across intestinal segments, microbiota states, and inflammatory conditions (<span style="color:blue">Science, 2025</span>; Media report "Gut Neurons Decoded"). 
    We identified a unique progenitor-like neuronal state (developmentally imprinted neurons) in adult mouse ENS. Distinct from canonical neurogenesis, these post-mitotic neurons retain developmental molecular signatures, serve as a neuronal reserve pool, and enable neuronal subtype replenishment via phenotypic remodeling, representing a novel adult ENS plasticity mechanism. These Bglap+ imprinted neurons feature elevated glycolysis and cholesterol biosynthesis, maintaining a poised state for neuronal remodeling and maturation. Microbiota and inflammatory signals drive their transition into functional Dcc+ and Aldh1a3+ inhibitory motor neurons, with Edf1 and Mitf verified as core regulators of this developmental trajectory via in vivo Perturb-seq screening.
    Additionally, we uncovered a novel immune-neuron signaling pathway in the gut. Nmu+ enteric neurons function as specific sensors of type 2 inflammation, directly recognizing tuft cell- and mast cell-derived leukotriene signals through CysLTR2. This ENS immune-sensing module converts local inflammatory inputs into neural signals via the gut-brain axis, potentially mediating adaptive behavioral responses and linking ENS function to intestinal inflammation and disease susceptibility.
  
- title: "Membrane-associated signalosome as a molecular decision-making hub for antiviral immune responses"
  summary: |
    Innate immunity constitutes the first line of defense against enteric pathogens, activated by PRRs (including cGAS, RIG-I, NOD, and inflammasomes) that sense PAMPs and DAMPs, with membrane-bound organelles acting as platforms for innate immune signaling. We developed an organelle-specific proximity labeling technique (<span style="color:blue">Nature Cell Biology, 2015</span>) and identified two TRIM14-centered complexes mediating spatiotemporal type I IFN signaling. The autophagosomal TRIM14-USP14 complex stabilizes cGAS against DNA viruses (<span style="color:blue">Molecular Cell, 2016</span>), and the mitochondrial WHIP-TRIM14-PPP6C complex regulates RIG-I trafficking and activation in RNA virus defense (<span style="color:blue">Molecular Cell, 2017</span>). Using scRNA-seq, we further analyzed SARS-CoV-2 entry receptors (ACE2, TMPRSS2, CTSL) and revealed their expression correlations with age and smoking, while uncovering immune networks and potential therapeutic targets for COVID-19 and ARDS (<span style="color:blue">Nature Medicine, 2021</span>).

- title: "Neutrophil-specific immune checkpoint"
  summary: |
    The tumor microenvironment (TME) comprises cancer cells and non-malignant components including myeloid cells, neurons, stromal cells, adipocytes, and microbes. Key questions remain regarding its spatiotemporal formation, cellular recruitment and remodeling, immune checkpoint regulation underlying T-cell evasion, and microbiome functions in tumorigenesis. We identified Beclin-1 as a neutrophil-specific immune checkpoint in pre-B-ALL (<span style="color:blue">JCI, 2019</span>), supporting the clinical correlation between neutrophil infiltration and poor cancer prognosis. Targeting neutrophils and the Beclin-1-IL-21 axis represents a potential strategy to complement CAR-T therapy, which is often hindered by CD19/CD20 loss in B-ALL. Furthermore, using a myeloid-specific Tak1-deficient mouse model, we discovered that Odoribacter splanchnicus drives Th17 accumulation via IL-1beta/IL-6 to suppress colitis and colon cancer, revealing a microbiota-mediated mechanism in intestinal tumorigenesis (<span style="color:blue">Cell Host & Microbe, 2021</span>).

- title: "Optogenetics - Shed light on gut physiology"
  summary: |
    We have developed a suite of genetically encoded optogenetic tools paired with upconversion nanoparticles for deep-tissue, long-range light-mediated targeted regulation, including OptoCRAC, LiCa, OptoPB, Sunbody, Moonbody, PhotoSMOC, OptoCAR, and pNUTs. These technologies enabled the investigation of calcium-dependent immune activation, membrane-contact site dynamics, type I IFN signaling, intrabody mechanisms, liquid-liquid phase separation, nucleolar compartmentation, and CAR-T activation (<span style="color:blue">eLife, 2015</span>; <span style="color:blue">Trends in Biotechnology, 2017</span>; <span style="color:blue">Chemical Science, 2017</span>; <span style="color:blue">Advanced Biology, 2021</span>; <span style="color:blue">Nature Communications, 2021</span>; <span style="color:blue">Nature Chemical Biology, 2021</span>; <span style="color:blue">Nucleic Acids Research, 2022</span>), providing foundational tools for understanding gut neuroimmunology. Our pioneering work in optogenetics also led to an invited review on optogenetics and cell physiology in <span style="color:blue">Physiological Reviews, 2022</span>.
