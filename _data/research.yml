- title: Regional encoding of the enteric nervous system and neural network in the gut: the discovery of developmental "engram cells" and neuro-immune interactions
  summary: "Our group investigates the gut–brain axis and neuroimmunology, focusing on regional coding of the enteric nervous system (ENS), neuro–innate immune crosstalk, and multiscale regulation of inflammation. We developed dedicated enteric neuroscience platforms—including RAISIN-V2-Seq and in vivo ENS Perturb-seq—and integrated them with STARmap PLUS spatial transcriptomics (<span style='color:blue'>Nature, 2023</span>) to map gut–brain circuitry and resolve in situ cellular communication in health and disease. Using this platform, we generated the first multidimensional single-cell atlas of enteric neurons across intestinal segments, microbiota states, and inflammatory conditions (<span style='color:blue'>Science, 2025</span>; FASI media report “Gut Neurons Decoded”), revealing previously unrecognized principles of ENS regional specialization and neuroimmune regulation: (1) Beyond defining mature neuronal diversity, we identified a population of progenitor-like enteric neurons in adult mice, which we termed developmentally imprinted neuronal states. Analogous to cellular engrams, these cells preserve molecular signatures of developmental programs and function as a neuronal reserve state that maintains developmental competence and supports replenishment of functional neuronal subtypes during tissue remodeling. Unlike classical neurogenesis, this process represents phenotypic remodeling and subtype replenishment within a post-mitotic neuronal population, highlighting a previously unappreciated form of neuronal plasticity in the adult ENS. These developmentally imprinted Bglap<sup>+</sup> neurons exhibit unique metabolic features, including enhanced glycolytic activity and cholesterol biosynthesis programs, consistent with a poised state capable of supporting membrane remodeling, axonal adaptation, and neuronal maturation. We discovered that microbiota colonization and inflammatory cues drive state transitions from Bglap<sup>+</sup> developmentally primed neurons toward functional Dcc<sup>+</sup> and Aldh1a3<sup>+</sup> inhibitory motor neuron populations. Through an in vivo Perturb-seq functional genomics screen, we identified Edf1 and Mitf as key regulators controlling these developmental trajectories and neuronal state transitions, linking ENS plasticity with gut physiology, immune regulation, and region-specific intestinal disease susceptibility. (2) We uncovered a previously unrecognized immune-to-neuron communication pathway in the gut, in which Nmu<sup>+</sup> enteric neurons act as specialized sensors of type 2 inflammatory states. Through expression of CysLTR2, these neurons can directly decode mast cell–derived leukotriene signals generated during allergic inflammation. These findings suggest that Nmu<sup>+</sup> enteric neurons may relay peripheral immune information through the gut–brain axis and potentially contribute to adaptive behavioral responses, including avoidance behaviors. This discovery establishes the ENS as an active immune-sensing neural interface capable of converting local inflammatory cues into neural signals that may influence organism-level responses."

- title: Innate sensing against gut pathogens: Membrane-associated signalosome as a molecular decision-making hub for antiviral immune responses
  summary: "Innate immunity constitutes the first line of defense against enteric pathogens, activated by PRRs (including cGAS, RIG-I, NOD, and inflammasomes) that sense PAMPs and DAMPs, with membrane-bound organelles acting as platforms for innate immune signaling. We developed an organelle-specific proximity labeling technique (<span style='color:blue'>Nature Cell Biology, 2015</span>) and identified two TRIM14-centered complexes mediating spatiotemporal type I IFN signaling: the autophagosomal TRIM14–USP14 complex stabilizes cGAS against DNA viruses (<span style='color:blue'>Molecular Cell, 2016</span>), and the mitochondrial WHIP–TRIM14–PPP6C complex regulates RIG-I trafficking and activation in RNA virus defense (<span style='color:blue'>Molecular Cell, 2017</span>). Using scRNA-seq, we further analyzed SARS-CoV-2 entry receptors (ACE2, TMPRSS2, CTSL) and revealed their expression correlations with age and smoking, while uncovering immune networks and drug targets for COVID-19 and ARDS (<span style='color:blue'>Nature Medicine, 2021</span>)."

- title: Gastrointestinal tumor microenvironment
  summary: "The tumor microenvironment (TME) comprises cancer cells and non-malignant components including myeloid cells, neurons, stromal cells, adipocytes and microbes, yet key questions remain regarding its spatiotemporal formation, cellular recruitment and remodeling, immune checkpoint regulation underlying T-cell evasion, and microbiome functions in tumorigenesis. We identified Beclin-1 as a neutrophil-specific immune checkpoint in pre B-ALL (<span style='color:blue'>JCI, 2019</span>), supporting the clinical correlation between neutrophil infiltration and poor cancer prognosis. Targeting neutrophils and the Beclin-1–IL-21 axis represents a novel strategy to complement CAR-T therapy, which is often hindered by CD19/CD20 loss in B-ALL. Furthermore, using a myeloid-specific Tak1-deficient mouse model, we discovered that Odoribacter splanchnicus drives Th17 accumulation via IL-1β/IL-6 to suppress colitis and colon cancer, revealing a microbiota-mediated mechanism in intestinal tumorigenesis (<span style='color:blue'>Cell Host & Microbe, 2021</span>)."

- title: Optogenetics in gut biology and diseases
  summary: "We have developed a suite of genetically encoded optogenetic tools paired with upconversion nanoparticles for deep-tissue, long-range light-mediated targeted regulation —— OptoCRAC, LiCa, OptoPB, Sunbody and Moonbody, PhotoSMOC, OptoCAR, pNUTs—— to begin to decode the core logic of calcium-dependent immune activation, membrane-contact site dynamics，type I IFN signaling, intrabody mechanism，liquid-liquid phase separation and nucleolar compartmentation, CAR-T activation (<span style='color:blue'>eLife, 2015</span>; <span style='color:blue'>Trends in Biotechnology, 2017</span>; <span style='color:blue'>Chemical Science, 2017</span>; <span style='color:blue'>Advanced Biology, 2021</span>; <span style='color:blue'>Nature Communications, 2021</span>; <span style='color:blue'>Nature Chemical Biology, 2021</span>; <span style='color:blue'>Nucleic Acids Research, 2022</span>), fundamental to understanding gut neuroimmunology. Our pioneering work in optogenetics has led to an invited review on optogenetics and cell physiology in <span style='color:blue'>Physiological Reviews, 2022</span>."
