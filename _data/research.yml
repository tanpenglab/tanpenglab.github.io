- title: Enteric nervous system and neuro-immune interaction
  summary: "Our group focuses on the gut-brain axis and neuroimmunology, targeting regionalized coding of the enteric nervous system (ENS), neuro-immune crosstalk, and multiscale regulatory mechanisms of inflammation. We developed RAISIN-V2-Seq and in vivo ENS Perturb-seq, combined with STARmap PLUS spatial transcriptomics to map the gut-brain axis. We constructed the world’s first multidimensional single-cell atlas of enteric neurons and identified key regulators of ENS cell states and crosstalk with microbiota and type 2 immune cells (**Science, 2025**). We also identified progenitor-like enteric neurons in adult mice and clarified their microbiota- and inflammation-driven cell-state mechanisms, with Edf1 and Mitf as key regulators linking cell states to gut physiology."

- title: Innate sensing against gut pathogens
  summary: "We study innate immune sensing and spatiotemporal regulation of antiviral responses via cGAS, RIG-I, NOD, and inflammasomes. We developed a live-cell organelle-specific proximity biotin-labeling technology (**Nature Cell Biology, 2015**) and identified two TRIM14-centered protein complexes: TRIM14-USP14 regulates anti-DNA virus immunity (**Molecular Cell, 2016**), and WHIP-TRIM14-PPP6C controls anti-RNA virus signaling (**Molecular Cell, 2017**). During COVID-19, we revealed single-cell profiles of viral invasion receptors and immune regulatory networks (**Nature Medicine, 2021**)."

- title: Gastrointestinal tumor environment
  summary: "We investigate the tumor microenvironment (TME) and microbiome in gastrointestinal tumors. We identified Beclin-1 as a neutrophil-specific immune checkpoint in pre B-ALL (**Journal of Clinical Investigation, 2019**). Using a myeloid cell-specific Tak1-deficient model, we discovered Odoribacter splanchnicus as a key protective bacterium that inhibits colitis and colon cancer by promoting Th17 cell accumulation via IL-1β and IL-6 (**Cell Host & Microbe, 2021**)."

- title: Optogenetics in gut biology and diseases
  summary: "We developed a series of optogenetic tools (OptoCRAC, LiCa, OptoPB, Sunbody, Moonbody, PhotoSMOC, OptoCAR, pNUTs) for deep-tissue regulation, decoding calcium signaling, membrane-contact dynamics, phase separation, and CAR-T activation (**eLife, 2015**; **Trends in Biotechnology, 2017**; **Chemical Science, 2017**; **Advanced Biology, 2021**; **Nature Communications, 2021**; **Nature Chemical Biology, 2021**; **Nucleic Acids Research, 2022**). Our work was highlighted by a review in **Physiological Reviews, 2022**."
