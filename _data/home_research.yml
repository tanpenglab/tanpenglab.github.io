- title: 'Innate Sensing: Understanding Host Responses to Pathogens'
  description: What are the underlying mechanisms that tightly regulate innate immune
    responses, particularly the spatiotemporal assembly of intracellular "signalosomes"
    involved in innate sensing pathways such as RIG-I, cGAS, and the inflammasome?
    Do any viruses hijack these signalosomes as part of their immune evasion strategies,
    and could these mechanisms serve as potential therapeutic targets for the development
    of effective antiviral drugs?
  image: https://static.wixstatic.com/media/d8287f_53c922dd889d424d86a0837ac5976da0~mv2.png
- title: Tumor Microenvironment and Metastasis
  description: What mechanisms drive shifts in cellular states or the differentiation
    of non-tumor components within the tumor microenvironment, such as immune cells,
    fibroblasts, adipocytes, neurons, and the microbiome, to promote tumor metastasis
    and immune evasion?
  image: https://static.wixstatic.com/media/d8287f_2efb9c24c3c043bcbac14dd358180237~mv2.png
- title: Enteric Nervous System and the Gut-Brain Axis
  description: How do region-specific neurons within the enteric nervous system maintain
    the integrity of the gastrointestinal (GI) barrier against harmful stimuli? What
    roles do these neurons play in the development of autoimmunity, allergies, and
    neurodegenerative diseases along the complex gut-brain axis?
  image: https://static.wixstatic.com/media/d8287f_dec62e4db7f0400dba53ad7b9fc1e10e~mv2.png
- title: Advancing Medical Science with Deep Tissue Optogenetics
  description: Optogenetics offers a powerful tool for the precise manipulation of
    cell physiology, providing remarkable spatiotemporal control. Our research focuses
    on pioneering optical pooled screens, which combine genetic and drug-based approaches,
    as well as the development of optogenetic immunotherapies aimed at effectively
    treating a range of diseases.
  image: /assets/images/p4.jpg
