lab_name: TAN LAB
tagline: From basic neuroimmunology to engineering
intro: We aim to elucidate the fundamental principles governing intestinal inflammation and disease progression in spatial and temporal dimensions by developing interdisciplinary technologies and AI-driven computational frameworks. We further develop design molecular switches and multimodal perturbations to interrogate functional genomics and tissue biology at single-cell and systems levels.
