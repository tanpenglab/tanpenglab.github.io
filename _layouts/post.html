---
layout: default
---

<section class="section">
  <div class="section-head">
    <div>
      <p class="eyebrow">LAB NEWS</p>
    </div>
  </div>

  <!-- 文章外层唯一的一个框 -->
  <div style="
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 32px 36px;
    background: #ffffff;
    max-width: 800px;
    margin: 0 auto;
  ">
    <h1 style="
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--ink);
      margin: 0 0 20px 0;
    ">{{ page.title }}</h1>

    <div style="
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
    ">
      {{ content }}
    </div>
  </div>
</section>
