---
layout: default
---

<section class="section">
  <div class="section-head">
    <div>
      <p class="eyebrow">LAB NEWS</p>
    </div>
  </div>

  <!-- 文章靠左对齐，无居中、无额外框 -->
  <div style="max-width: 800px;">
    <h1 style="
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--ink);
      margin: 0 0 24px 0;
    ">{{ page.title }}</h1>

    <div style="
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
    ">
      {{ content }}
    </div>
  </div>
</section>
