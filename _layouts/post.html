---
layout: default
---

<section class="section">
  <div class="section-head">
    <div>
      <p class="eyebrow">LAB NEWS</p>
    </div>
  </div>

  <!-- 直接放文章内容，不额外加框，和页面主体融为一体 -->
  <div style="max-width: 800px; margin: 0 auto;">
    <h1 style="
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--ink);
      margin: 0 0 24px 0;
    ">{{ page.title }}</h1>

    <div style="
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
    ">
      {{ content }}
    </div>
  </div>
</section>
