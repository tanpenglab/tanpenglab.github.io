<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="{{ site.data.site.intro | strip_newlines }}">

  <body>

    <main class="page-shell">
      {{ content }}

    {% include footer.html %}

</html>
